apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: firerisk-ingress
  namespace: group02
  # annotations:
  #   nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: group02.local
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
                  