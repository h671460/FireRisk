server {
  listen 443 ssl;
  server_name fireriskgroup02.com www.fireriskgroup02.com;

  ssl_certificate     /etc/letsencrypt/live/auth.fireriskgroup02.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/auth.fireriskgroup02.com/privkey.pem;

  location / {
    proxy_pass http://frontend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}