server {
  listen 443 ssl;
  server_name api.fireriskgroup02.com;

  ssl_certificate     /etc/letsencrypt/live/auth.fireriskgroup02.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/auth.fireriskgroup02.com/privkey.pem;

  location / {
    proxy_pass http://frcm-api:6767;  # <-- confirm your API port
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}