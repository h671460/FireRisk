name: app_workflow

on:
  push:
    branches: [ "main","ci-build" ]
  pull_request:
    branches: [ "main","ci-build" ]
  workflow_dispatch:

env:
  MET_CLIENT_ID: ${{ secrets.MET_CLIENT_ID }}
  MET_CLIENT_SECRET: ${{ secrets.MET_CLIENT_SECRET }}

jobs:
  unit_tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Install uv package manager
      run: |
        python -m pip install --user pipx
        pipx install uv

    - name: Cache dependencies
      uses: actions/cache@v4
      id: cache
      with:
        path: ./.venv
        key: venv-${{ hashFiles('**/uv.lock')}}

    - name: Install uv dependencies
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        uv venv
        uv sync --locked

    - name: Test with pytest test_main
      run: |
        export PYTHONPATH=$(pwd)
        uv run pytest -vs tests/test_src/test_firerisk/test_api/test_main.py

    - name: Test with pytest test_user
      run: |
        export PYTHONPATH=$(pwd)
        uv run pytest -vs tests/test_src/test_firerisk/test_api/test_route/test_user.py

  integration_tests:
    runs-on: ubuntu-latest

    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        volumes:
          - ${{ github.workspace }}/init-timescaledb:/docker-entrypoint-initdb.d
        options: >-
          --health-cmd="pg_isready -U testuser -d testdb"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    env:
      TIMESCALE_USER: testuser
      TIMESCALE_PASSWORD: testpassword
      TIMESCALE_DATABASE: testdb
      TIMESCALE_HOST: localhost
      TIMESCALE_PORT: 5432

    steps:
    - name: Checkout the code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip

    - name: Install uv package manager
      run: |
        python -m pip install --user pipx
        pipx install uv

    - name: Cache dependencies
      uses: actions/cache@v4
      id: cache
      with:
        path: ./.venv
        key: venv-${{ hashFiles('**/uv.lock')}}

    - name: Install uv dependencies
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        uv venv
        uv sync --locked

    - name: Test with pytest test_frcm_route
      run: |
        export PYTHONPATH=$(pwd)
        uv run pytest -vs tests/test_src/test_firerisk/test_api/test_route/test_frcm_route.py

  build_and_push:
    runs-on: ubuntu-latest
    # needs: [unit_tests, integration_tests]

    steps:
    - name: Checkout the code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: build frcm-api and publish to dockerhub
      run: |
        docker build -f Dockerfile.api -t ${{ secrets.DOCKERHUB_USERNAME }}/frcm-api:latest .
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/frcm-api:latest

    - name: build frcm-frontend and publish to dockerhub
      run: |
        docker build -f Dockerfile.frontend -t ${{ secrets.DOCKERHUB_USERNAME }}/frcm-frontend:latest .
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/frcm-frontend:latest


  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push

    steps:
    - name: Restart deployment on VM
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USER }}
        key: ${{ secrets.VM_SSH_KEY }}
        script: |
          kubectl delete deployment frcm-api -n group2 --ignore-not-found
          kubectl delete replicaset -n group2 -l app=frcm-api --ignore-not-found
          kubectl delete pod -n group2 -l app=frcm-api --force --grace-period=0 --ignore-not-found
          kubectl apply -f /home/ubuntu/kubernetes/FireRisk_k/frcm-api/deployment.yaml
          kubectl wait --for=condition=ready pod -l app=frcm-api -n group2 --timeout=180s